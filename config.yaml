data:
  path: "/mnt/c/Users/User/repo/datasets/CAVE"
  spatial_size: [256, 256]
  train_patch_size: [128, 128]
  val_patch_size: []
  test_patch_size: []
  patches_per_scene: 32
  train_ratio: 0.8
  augment: true
  normalization: "by_dtype"
  splits:
    val:
      - face_ms
      - fake_and_real_beers_ms
      - watercolors_ms
    test:
      - balloons_ms
      - oil_painting_ms
      - fake_and_real_strawberries_ms

model:
  d_model: 128
  d_state: 64
  d_conv: 4
  headdim: 16
  expand: 2
  ssm_version: "mamba3"
  use_wavelet: true
  use_gradient_attn: true

training:
  batch_size: 8
  epochs: 200
  lr: 0.0001 # или 1e-4 без кавычек
  device: "cuda"
